<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{REPORT_TITLE}}</title>
{{GOOGLE_FONTS_LINK}}
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ── Design Tokens ── */
:root{
  --primary:{{PRIMARY}};
  --accent:{{ACCENT}};
  --bg:{{BG}};
  --bg-secondary:{{BG_SECONDARY}};
  --text:{{TEXT}};
  --text-secondary:{{TEXT_SECONDARY}};
  --border:{{BORDER}};
  --font-main:{{FONT_MAIN}};
  --font-mono:{{FONT_MONO}};
}

/* ── Base ── */
body{
  font-family:var(--font-main);
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
  max-width:900px;
  margin:0 auto;
  padding:40px 32px;
  font-size:15px;
}

/* ── Typography ── */
h1{
  font-size:32px;font-weight:600;line-height:1.3;
  color:var(--primary);margin-bottom:8px;
  border-bottom:3px solid var(--primary);padding-bottom:12px;
}
h2{
  font-size:24px;font-weight:600;line-height:1.35;
  color:var(--primary);margin-top:48px;margin-bottom:16px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
h3{
  font-size:18px;font-weight:600;line-height:1.4;
  margin-top:32px;margin-bottom:12px;
}
h4{
  font-size:16px;font-weight:600;line-height:1.4;
  margin-top:24px;margin-bottom:8px;
}
p{margin-bottom:12px}

/* ── Report Meta ── */
.report-meta{
  color:var(--text-secondary);
  font-size:14px;line-height:1.8;
  margin-bottom:32px;
}
.report-meta strong{color:var(--text)}

/* ── Tables ── */
table{
  width:100%;border-collapse:collapse;
  margin:16px 0 24px;font-size:14px;
}
thead{background:var(--bg-secondary)}
th{
  text-align:left;padding:10px 12px;
  font-weight:600;font-size:13px;
  text-transform:uppercase;letter-spacing:0.5px;
  color:var(--text-secondary);
  border-bottom:2px solid var(--border);
}
td{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  vertical-align:top;
}
tr:hover{background:var(--bg-secondary)}

/* ── Lists ── */
ul,ol{margin:8px 0 16px 24px}
li{margin-bottom:6px}

/* ── Blockquote (user quotes) ── */
blockquote{
  border-left:3px solid var(--accent);
  padding:8px 16px;margin:12px 0;
  background:var(--bg-secondary);
  font-style:italic;color:var(--text-secondary);
}

/* ── Tags / Badges ── */
.tag{
  display:inline-block;padding:2px 8px;
  border-radius:4px;font-size:12px;font-weight:500;
  margin-right:4px;
}
.tag-direct{background:#d4edda;color:#155724}
.tag-indirect{background:#fff3cd;color:#856404}
.tag-potential{background:#f8d7da;color:#721c24}

/* ── Feature Matrix Icons ── */
.feat-full{color:#28a745}
.feat-partial{color:#ffc107}
.feat-none{color:#dc3545}

/* ── Cards (competitor summary) ── */
.competitor-card{
  border:1px solid var(--border);
  border-radius:8px;padding:24px;
  margin:16px 0;background:var(--bg);
}
.competitor-card h3{margin-top:0}

/* ── Divider ── */
hr{
  border:none;border-top:1px solid var(--border);
  margin:32px 0;
}

/* ── Print Styles ── */
@media print{
  body{
    max-width:100%;padding:0;
    font-size:12px;line-height:1.5;
  }
  @page{
    size:A4;
    margin:20mm 15mm 25mm 15mm;
  }
  h2{page-break-before:always}
  h2:first-of-type{page-break-before:avoid}
  table,blockquote,.competitor-card{page-break-inside:avoid}
  thead{display:table-header-group}
  .no-print{display:none}

  /* Running footer with page numbers */
  @bottom-center{
    content:counter(page);
    font-size:10px;color:var(--text-secondary);
  }
}
</style>
</head>
<body>

<!-- Report content will be injected here by the skill -->
<div id="report-content">
{{REPORT_CONTENT}}
</div>

</body>
</html>
